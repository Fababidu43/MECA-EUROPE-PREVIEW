    <circle class="gridDot" cx="0" cy="32" r="1.7"/><circle class="gridDot" cx="16" cy="32" r="1.7"/><circle class="gridDot" cx="32" cy="32" r="1.7"/><circle class="gridDot" cx="48" cy="32" r="1.7"/>
    <circle class="gridDot" cx="0" cy="48" r="1.7"/><circle class="gridDot" cx="16" cy="48" r="1.7"/><circle class="gridDot" cx="32" cy="48" r="1.7"/><circle class="gridDot" cx="48" cy="48" r="1.7"/>
