    <circle cx="180" cy="170" r="48" class="soft"/>
  </g>

  <g opacity="0.55" transform="translate(1490 92)">
    <path d="M0 0 h84 v56 h-84" class="line2"/>
    <circle cx="22" cy="18" r="2.8" class="accent"/>
    <circle cx="38" cy="18" r="2.8" class="gridDot"/>
    <circle cx="54" cy="18" r="2.8" class="gridDot"/>
    <circle cx="22" cy="34" r="2.8" class="gridDot"/>
