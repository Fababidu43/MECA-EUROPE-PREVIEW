  <circle cx="290" cy="170" r="11" fill="#fff" class="line2"/>
  <circle cx="290" cy="170" r="4" class="accent"/>
  <circle cx="430" cy="140" r="6" fill="#fff" class="line2"/>

  <path d="M560 170 H710" class="line"/>
  <circle cx="760" cy="116" r="56" class="soft" opacity="0.65"/>
  <circle cx="760" cy="116" r="34" class="soft" opacity="0.85"/>
  <line x1="760" y1="20" x2="760" y2="70" class="dash"/>
  <line x1="760" y1="162" x2="760" y2="220" class="dash"/>
  <circle cx="760" cy="116" r="4.5" class="accent"/>
  <path d="M710 170 L738 142" class="line"/>
  <path d="M782 142 L820 170 H940" class="line"/>

  <path d="M940 170 H1020 L1048 150 H1108 L1134 126 H1210 L1236 150 H1310 L1332 128 H1450" class="line"/>
